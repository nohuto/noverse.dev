name: site-update

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Refresh repository data
        run: python main/scripts/update-repo-descs.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout win-config
        uses: actions/checkout@v6
        with:
          repository: nohuto/win-config
          ref: main
          path: sources/win-config

      - name: Checkout nvapi-cli
        uses: actions/checkout@v6
        with:
          repository: nohuto/nvapi-cli
          ref: main
          path: sources/nvapi-cli

      - name: Checkout regkit
        uses: actions/checkout@v6
        with:
          repository: nohuto/regkit
          ref: main
          path: sources/regkit

      - name: Checkout app-tools
        uses: actions/checkout@v6
        with:
          repository: nohuto/app-tools
          ref: main
          path: sources/app-tools

      - name: Checkout game-tools
        uses: actions/checkout@v6
        with:
          repository: nohuto/game-tools
          ref: main
          path: sources/game-tools

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs-site

      - name: Build docs output
        run: npm run docs:build
        working-directory: docs-site
        env:
          WIN_CONFIG_REPO_URL: https://github.com/nohuto/win-config
          NVAPI_CLI_REPO_URL: https://github.com/nohuto/nvapi-cli
          REGKIT_REPO_URL: https://github.com/nohuto/regkit
          APP_TOOLS_REPO_URL: https://github.com/nohuto/app-tools
          GAME_TOOLS_REPO_URL: https://github.com/nohuto/game-tools

      - name: Commit generated site changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep .; then
            git add docs docs-site/src/content/docs main/data/repos.json main/data/media-cache.json main/media main/images
            git commit -m "update docs data"
            git push
          else
            echo "No changes to commit."
          fi
