<!DOCTYPE html>
<!-- Copyright (c) 2026 Nohuto -->
<html lang="en" data-theme-setting="gruvbox-dark" data-theme="gruvbox-dark" data-bg="dots" data-font="cascadia">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Compare decompiled pseudocode and type layouts">
  <title>Diff</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/main/images/nvlogo.png">
  <link rel="stylesheet" href="main/min/styles.min.css">
  <link rel="stylesheet" href="main/min/tools.min.css">
  <script src="main/min/bootstrap.min.js" defer></script>
  <script src="main/min/app.min.js" defer></script>
  <script src="main/min/diff.min.js" defer></script>
</head>

<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <header class="prompt-bar">
    <div class="prompt-line" role="group" aria-label="Terminal prompt">
      <span class="prompt-user">nohuto</span>
      <span class="prompt-sep">@</span>
      <span class="prompt-host">noverse</span>
    </div>
    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to light theme"><span class="theme-toggle-icon" aria-hidden="true"></span></button>
    <nav class="nav-tabs" aria-label="Primary navigation">
      <a href="/">terminal</a>
      <a href="/product">product</a>
      <a href="/projects">projects</a>
      <a href="/diff" aria-current="page" class="active">diff</a>
      <a href="/policies">policies</a>
      <a href="/docs/">docs</a>
    </nav>
  </header>

  <main id="main" class="no-center bindiff-main">
    <section class="content-box panel" id="diff-app" data-title="diff" aria-busy="true">
      <div class="panel-body">
        <div class="bindiff-intro">
          <h1 class="projects-heading">Pseudocode &amp; type layout diff</h1>
          <div class="projects-divider"></div>
          <p>Compare or display (shows content of left build) decompiled pseudocode (<a class="link" href="https://github.com/nohuto/decompiled-pseudocode" target="_blank" rel="noopener noreferrer">decompiled-pseudocode</a>) or type layouts (<a class="link" href="https://github.com/nohuto/type-layouts" target="_blank" rel="noopener noreferrer">type-layouts</a>) of different builds.</p>
        </div>

        <div class="bindiff-controls">
          <div class="bindiff-grid diff-grid">
            <div class="bindiff-field bindiff-field-compact diff-build-field">
              <label for="diff-left-release">Left build</label>
              <select class="select-enhanced" id="diff-left-release" name="left-release">
                <option value=""></option>
              </select>
            </div>
            <div class="bindiff-field bindiff-field-compact diff-build-field">
              <label for="diff-right-release">Right build</label>
              <select class="select-enhanced" id="diff-right-release" name="right-release">
                <option value=""></option>
              </select>
            </div>
            <div class="bindiff-field bindiff-field-compact diff-kind-field">
              <div class="diff-kind-toggle" id="diff-kind-toggle" role="group" aria-label="Diff source">
                <button class="is-active" type="button" data-kind="type" aria-pressed="true">Type</button>
                <button type="button" data-kind="pseudocode" aria-pressed="false">Pseudocode</button>
              </div>
            </div>
            <div class="bindiff-field bindiff-field-compact diff-module-field">
              <label for="diff-module">Module</label>
              <select class="select-enhanced" id="diff-module" name="module">
                <option value=""></option>
              </select>
            </div>
            <div class="bindiff-field bindiff-field-compact diff-name-field">
              <label for="diff-name">Type</label>
              <select class="select-enhanced" data-searchable="true" data-search-limit="300" id="diff-name" name="name">
                <option value=""></option>
              </select>
            </div>
          </div>

          <div class="bindiff-output-tools">
            <div class="bindiff-actions">
              <button id="diff-display" type="button" disabled>Display</button>
              <button id="diff-run" type="button" disabled>Compare</button>
            </div>
          </div>
        </div>

        <div class="bindiff-output-frame">
          <div class="bindiff-view-tools bindiff-frame-view-tools" id="diff-view-tools" hidden>
            <div class="bindiff-view-toggle" aria-label="View mode" id="diff-view-mode" role="group">
              <button class="bindiff-view-button is-active" type="button" data-mode="side-by-side" aria-label="Side by side" title="Side by side" aria-pressed="true">
                <svg class="bindiff-view-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path d="M12 4l0 16"></path>
                  <path d="M4 4l0 .01"></path>
                  <path d="M8 4l0 .01"></path>
                  <path d="M16 4l0 .01"></path>
                  <path d="M20 4l0 .01"></path>
                  <path d="M4 8l0 .01"></path>
                  <path d="M20 8l0 .01"></path>
                  <path d="M4 12l0 .01"></path>
                  <path d="M8 12l0 .01"></path>
                  <path d="M16 12l0 .01"></path>
                  <path d="M20 12l0 .01"></path>
                  <path d="M4 16l0 .01"></path>
                  <path d="M20 16l0 .01"></path>
                  <path d="M4 20l0 .01"></path>
                  <path d="M8 20l0 .01"></path>
                  <path d="M16 20l0 .01"></path>
                  <path d="M20 20l0 .01"></path>
                </svg>
                <span class="sr-only">Side by side</span>
              </button>
              <button class="bindiff-view-button" type="button" data-mode="line-by-line" aria-label="Line by line" title="Line by line" aria-pressed="false">
                <svg class="bindiff-view-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path d="M4 12l16 0"></path>
                  <path d="M4 4l0 .01"></path>
                  <path d="M8 4l0 .01"></path>
                  <path d="M12 4l0 .01"></path>
                  <path d="M16 4l0 .01"></path>
                  <path d="M20 4l0 .01"></path>
                  <path d="M4 8l0 .01"></path>
                  <path d="M12 8l0 .01"></path>
                  <path d="M20 8l0 .01"></path>
                  <path d="M4 16l0 .01"></path>
                  <path d="M12 16l0 .01"></path>
                  <path d="M20 16l0 .01"></path>
                  <path d="M4 20l0 .01"></path>
                  <path d="M8 20l0 .01"></path>
                  <path d="M12 20l0 .01"></path>
                  <path d="M16 20l0 .01"></path>
                  <path d="M20 20l0 .01"></path>
                </svg>
                <span class="sr-only">Line by line</span>
              </button>
            </div>
          </div>
          <button id="diff-swap" type="button" aria-label="Swap builds" title="Swap builds" hidden>
            <svg class="bindiff-swap-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
              <path d="M16 3l4 4l-4 4"></path>
              <path d="M10 7h10"></path>
              <path d="M8 13l-4 4l4 4"></path>
              <path d="M4 17h9"></path>
            </svg>
            <span class="sr-only">Swap builds</span>
          </button>
          <button id="diff-settings" type="button" aria-label="Diff settings" title="Diff settings" hidden>
            <svg class="bindiff-settings-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
              <path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065"></path>
              <path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"></path>
            </svg>
            <span class="sr-only">Diff settings</span>
          </button>
          <button id="diff-maximize" type="button" aria-pressed="false" aria-label="Maximize diff" title="Maximize diff" hidden>
            <svg class="bindiff-maximize-icon icon-maximize" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
              <path d="M16 4h4v4"></path>
              <path d="M14 10l6 -6"></path>
              <path d="M8 20h-4v-4"></path>
              <path d="M4 20l6 -6"></path>
              <path d="M16 20h4v-4"></path>
              <path d="M14 14l6 6"></path>
              <path d="M8 4h-4v4"></path>
              <path d="M4 4l6 6"></path>
            </svg>
            <svg class="bindiff-maximize-icon icon-minimize" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
              <path d="M5 9h4v-4"></path>
              <path d="M3 3l6 6"></path>
              <path d="M5 15h4v4"></path>
              <path d="M3 21l6 -6"></path>
              <path d="M19 9h-4v-4"></path>
              <path d="M15 9l6 -6"></path>
              <path d="M19 15h-4v4"></path>
              <path d="M15 15l6 6"></path>
            </svg>
            <span class="sr-only">Toggle diff maximize</span>
          </button>
          <div id="diff-output" class="bindiff-output" aria-live="off"></div>
        </div>

        <div class="bindiff-settings-modal" id="diff-settings-modal" hidden>
          <div class="bindiff-settings-dialog" id="diff-settings-dialog" role="dialog" aria-modal="true" aria-labelledby="diff-settings-title">
            <div class="bindiff-settings-header" id="diff-settings-header">
              <h2 id="diff-settings-title">Settings</h2>
              <button id="diff-settings-close" type="button" aria-label="Close settings" title="Close settings">
                <svg class="bindiff-close-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                  <path d="M18 6l-12 12"></path>
                  <path d="M6 6l12 12"></path>
                </svg>
                <span class="sr-only">Close settings</span>
              </button>
            </div>
            <div class="bindiff-settings-body" id="diff-settings-body"></div>
            <div class="bindiff-settings-footer">
              <button id="diff-settings-reset" type="button">Reset</button>
              <button id="diff-settings-done" type="button">Close</button>
            </div>
          </div>
        </div>

        <div class="bindiff-links" id="diff-links" hidden>
          <a id="diff-left-link" class="link" href="#" target="_blank" rel="noopener noreferrer">Left source</a>
          <a id="diff-right-link" class="link" href="#" target="_blank" rel="noopener noreferrer">Right source</a>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <footer>
    <div class="footer-row">
      <div class="footer-left">
        <div class="footer-copy">&copy; 2026 Nohuto</div>
      </div>
      <div class="footer-tools">
        <div class="footer-tools-row">
          <select id="theme-select" name="theme" aria-label="Theme">
              <option value="system">System</option>
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="ayu-dark">Ayu Dark</option>
              <option value="ayu-light">Ayu Light</option>
              <option value="catppuccin-frappe">Catppuccin Frappe</option>
              <option value="catppuccin-latte">Catppuccin Latte</option>
              <option value="catppuccin-macchiato">Catppuccin Macchiato</option>
              <option value="catppuccin-mocha">Catppuccin Mocha</option>
              <option value="everforest-dark">Everforest Dark</option>
              <option value="everforest-light">Everforest Light</option>
              <option value="gray-black">Gray Black</option>
              <option value="gruvbox-dark">Gruvbox Dark</option>
              <option value="gruvbox-light">Gruvbox Light</option>
              <option value="horizon">Horizon</option>
              <option value="kanagawa-dragon">Kanagawa Dragon</option>
              <option value="kanagawa-lotus">Kanagawa Lotus</option>
              <option value="kanagawa-wave">Kanagawa Wave</option>
              <option value="monokai">Monokai</option>
              <option value="night-owl">Night Owl</option>
              <option value="nord">Nord</option>
              <option value="one-dark">One Dark</option>
              <option value="one-light">One Light</option>
              <option value="purple-black">Purple Black</option>
              <option value="rose-pine">Rose Pine</option>
              <option value="rose-pine-moon">Rose Pine Moon</option>
              <option value="solarized-dark">Solarized Dark</option>
              <option value="solarized-light">Solarized Light</option>
          </select>
        </div>
      </div>
      <div class="social">
        <a href="https://github.com/nohuto" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">
          <span class="social-icon social-icon-github" aria-hidden="true"></span>
        </a>
        <button class="icon-button" type="button" data-email="copy" data-toast="Email copied" aria-label="Copy email to clipboard">
          <span class="social-icon social-icon-email" aria-hidden="true"></span>
        </button>
        <a href="https://discord.noverse.dev" target="_blank" rel="noopener noreferrer" aria-label="Discord server">
          <span class="social-icon social-icon-discord" aria-hidden="true"></span>
        </a>
      </div>
    </div>
  </footer>
</body>

</html>
