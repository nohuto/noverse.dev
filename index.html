<!DOCTYPE html>
<!-- Copyright (c) 2026 Nohuto -->
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terminal</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/main/images/nvlogo.png">
  <script src="main/bootstrap.js"></script>
  <link rel="stylesheet" href="main/styles.css">
  <script src="main/app.js" defer></script>
  <script src="main/terminal.js" defer></script>
</head>

<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <header class="prompt-bar">
    <div class="prompt-line" role="group" aria-label="Terminal prompt">
      <span class="prompt-user">nohuto</span>
      <span class="prompt-sep">@</span>
      <span class="prompt-host">noverse</span>
      <span class="prompt-path">:~/terminal</span>
      <span class="prompt-caret">$</span>
      <span class="prompt-cmd">open</span>
    </div>
    <nav class="nav-tabs" aria-label="Primary navigation">
      <a href="/" aria-current="page" class="active">terminal</a>
      <a href="/product">product</a>
      <a href="/projects">projects</a>
      <a href="/bin-diff">bin-diff</a>
      <a href="/policies">policies</a>
      <a href="/docs/">docs</a>
    </nav>
  </header>

  <main id="main" class="main-terminal">
    <section class="terminal-shell" data-title="terminal">
      <div class="window-surface">
        <div class="console-window" id="console-window" role="region" aria-label="Terminal window">
          <div class="console-window-header" id="console-drag">
            <span>terminal</span>
            <span class="console-window-meta">drag / resize</span>
          </div>
          <div class="console-window-body">
            <div class="console" id="console">
              <div class="console-output" id="console-output" role="log" aria-live="polite" aria-relevant="additions">
                <div class="console-lines" id="console-lines"></div>
                <form class="console-input" id="console-form" autocomplete="off">
                  <span class="console-prompt">nohuto@noverse:~/terminal$</span>
                  <span class="console-edit">
                    <span class="console-measure" id="console-measure" aria-hidden="true"></span>
                    <span class="console-ghost" id="console-ghost" aria-hidden="true"></span>
                    <input id="console-command" type="text" name="command" spellcheck="false" autocomplete="off" autocapitalize="off" aria-label="Console command input">
                    <button type="submit" class="sr-only">Run command</button>
                    <span class="console-block-cursor" id="console-cursor" aria-hidden="true"></span>
                  </span>
                  <span class="console-timestamp" id="console-timestamp" aria-hidden="true"></span>
                </form>
              </div>
            </div>
          </div>
        </div>
        <div class="bitmask-layer" id="bitmask-layer" hidden>
          <div class="bitmask-window" id="bitmask-window" role="dialog" aria-modal="true" aria-labelledby="bitmask-title">
            <div class="bitmask-header" id="bitmask-drag">
              <h2 id="bitmask-title">bitmask</h2>
              <button class="bitmask-close" id="bitmask-close" type="button" aria-label="Close bitmask calculator" title="Close">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M18 6 6 18M6 6l12 12"></path>
                </svg>
              </button>
            </div>
            <div class="bitmask-body">
              <div class="bitmask-field" id="bitmask-field" aria-label="32-bit field"></div>
              <div class="bitmask-values" aria-live="polite">
                <label><span>DEC</span><input id="bitmask-dec" type="text" value="0" inputmode="numeric" autocomplete="off" spellcheck="false"></label>
                <label><span>HEX</span><input id="bitmask-hex" type="text" value="0x00000000" autocomplete="off" spellcheck="false"></label>
                <label><span>BIN</span><input id="bitmask-bin" type="text" value="00000000 00000000 00000000 00000000" inputmode="numeric" autocomplete="off" spellcheck="false"></label>
              </div>
              <div class="bitmask-actions">
                <button type="button" data-bitmask-action="invert">Invert</button>
                <button type="button" data-bitmask-action="all">Set all</button>
                <button type="button" data-bitmask-action="clear">Clear</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <footer>
    <div class="footer-row">
      <div class="footer-left">
        <div class="social">
          <a href="https://github.com/nohuto" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">
            <img decoding="async" src="main/icons/dark/github-icon.png" width="96" height="96" data-dark-src="main/icons/dark/github-icon.png" data-light-src="main/icons/light/github-icon.png" loading="lazy" alt="">
          </a>
          <!-- <a href="https://www.youtube.com/@5Noverse" target="_blank" rel="noopener noreferrer">
            <img decoding="async" src="main/icons/dark/youtube-icon.png" width="96" height="96" data-dark-src="main/icons/dark/youtube-icon.png" data-light-src="main/icons/light/youtube-icon.png" loading="lazy" alt="">
          </a> -->
          <button class="icon-button" type="button" data-email="copy" data-toast="Email copied" aria-label="Copy email to clipboard">
            <img decoding="async" src="main/icons/dark/email-icon.svg" width="24" height="24" data-dark-src="main/icons/dark/email-icon.svg" data-light-src="main/icons/light/email-icon.svg" loading="lazy" alt="">
          </button>
          <a href="https://discord.noverse.dev" target="_blank" rel="noopener noreferrer" aria-label="Discord server">
            <img decoding="async" src="main/icons/dark/discord-icon.png" width="100" height="100" data-dark-src="main/icons/dark/discord-icon.png" data-light-src="main/icons/light/discord-icon.png" loading="lazy" alt="">
          </a>
        </div>
        <div class="footer-copy">&copy; 2026 Nohuto</div>
      </div>
      <div class="footer-tools">
        <div class="footer-tools-row">
          <div class="footer-control">
            <label class="theme-label" for="bg-select">bg</label>
            <select id="bg-select" name="background">
              <option value="clear">Clear</option>
              <option value="diamonds">Diamonds</option>
              <option value="noise">Noise</option>
              <option value="dots">Dots</option>
              <option value="grid">Grid</option>
              <option value="carbon">Carbon</option>
              <option value="starfield" data-animated="true">Starfield</option>
            </select>
          </div>
          <div class="footer-control">
            <label class="theme-label" for="theme-select">theme</label>
            <select id="theme-select" name="theme">
              <option value="system">System</option>
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="ayu-dark">Ayu Dark</option>
              <option value="ayu-light">Ayu Light</option>
              <option value="catppuccin-frappe">Catppuccin Frappe</option>
              <option value="catppuccin-latte">Catppuccin Latte</option>
              <option value="catppuccin-macchiato">Catppuccin Macchiato</option>
              <option value="catppuccin-mocha">Catppuccin Mocha</option>
              <option value="everforest-dark">Everforest Dark</option>
              <option value="everforest-light">Everforest Light</option>
              <option value="gray-black">Gray Black</option>
              <option value="gruvbox-dark">Gruvbox Dark</option>
              <option value="gruvbox-light">Gruvbox Light</option>
              <option value="horizon">Horizon</option>
              <option value="kanagawa-dragon">Kanagawa Dragon</option>
              <option value="kanagawa-lotus">Kanagawa Lotus</option>
              <option value="kanagawa-wave">Kanagawa Wave</option>
              <option value="monokai">Monokai</option>
              <option value="night-owl">Night Owl</option>
              <option value="nord">Nord</option>
              <option value="one-dark">One Dark</option>
              <option value="one-light">One Light</option>
              <option value="purple-black">Purple Black</option>
              <option value="rose-pine">Rose Pine</option>
              <option value="rose-pine-moon">Rose Pine Moon</option>
              <option value="solarized-dark">Solarized Dark</option>
              <option value="solarized-light">Solarized Light</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </footer>
</body>

</html>
