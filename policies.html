<!DOCTYPE html>
<!-- Copyright (c) 2026 Nohuto -->
<html lang="en" data-theme-setting="gruvbox-dark" data-theme="gruvbox-dark" data-bg="dots" data-font="cascadia">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Group Policy Explorer">
  <title>Policies</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/main/images/nvlogo.png">
  <style>:root{color-scheme:dark;--bg:#0f1010;--bg-alt:#171819;--border:#373331;--text:#d6d2c8;--muted:#aaa39b;--accent:#d79921;--font-family:"Cascadia Mono","Cascadia Code",Consolas,"SFMono-Regular",Menlo,Monaco,"Liberation Mono",monospace}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-family);font-size:13px}body{display:flex;flex-direction:column;min-height:100vh;min-height:100svh}header,footer,main{position:relative;z-index:2}.prompt-bar{position:sticky;top:0;z-index:20;display:flex;flex-wrap:wrap;gap:6px 18px;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg-alt);border-bottom:1px solid var(--border)}.prompt-line{display:flex;align-items:center;gap:2px;font-size:1rem;text-transform:lowercase;letter-spacing:.02em}.prompt-user,.prompt-host,.nav-tabs a.active{color:var(--accent)}.nav-tabs{display:flex;flex-wrap:nowrap;column-gap:14px;row-gap:4px;margin-left:auto}.nav-tabs a{color:var(--muted);text-decoration:none;white-space:nowrap}main{flex:1;width:min(1200px,100%);margin:0 auto;padding:32px 18px 40px}footer{margin-top:auto;background:var(--bg-alt);border-top:1px solid var(--border)}</style>
  <style>[data-theme="light"]{color-scheme:light;--bg:#f5f5f5;--bg-alt:#ececec;--border:#c6c6c6;--text:#1d1d1d;--muted:#5d5d5d;--accent:#1f6f93}[data-theme="gruvbox-light"]{color-scheme:light;--bg:#fbf1c7;--bg-alt:#f2e5bc;--border:#d5c4a1;--text:#3b3b38;--muted:#6f6d68;--accent:#d79921}.theme-toggle{display:none}</style>
  <link rel="preload" href="main/min/styles.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="main/min/tools.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="main/min/styles.min.css"><link rel="stylesheet" href="main/min/tools.min.css"></noscript>
  <script src="main/min/bootstrap.min.js" defer></script>
  <script src="main/min/app.min.js" defer></script>
  <script src="main/min/policies.min.js" defer></script>
</head>

<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <header class="prompt-bar">
    <div class="prompt-line" role="group" aria-label="Terminal prompt">
      <span class="prompt-user">nohuto</span>
      <span class="prompt-sep">@</span>
      <span class="prompt-host">noverse</span>
    </div>
    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to light theme"><span class="theme-toggle-icon" aria-hidden="true"></span></button>
    <nav class="nav-tabs" aria-label="Primary navigation">
      <a href="/">terminal</a>
      <a href="/product">product</a>
      <a href="/projects">projects</a>
      <a href="/bin-diff">bin-diff</a>
      <a href="/policies" aria-current="page" class="active">policies</a>
      <a href="/docs/">docs</a>
    </nav>
  </header>

  <main id="main" class="no-center policies-main">
    <section class="content-box panel policy-hide-detail" id="policy-explorer" data-title="policies" aria-busy="true">
      <div class="panel-body">
        <div class="policy-intro">
          <div class="policy-title-row">
            <h1 class="projects-heading">Group Policy Explorer</h1>
            <span class="policy-source-note">(based on <a href="https://github.com/nohuto/admx-parser" rel="noopener noreferrer">admx-parser</a>)</span>
          </div>
          <div class="projects-divider"></div>
        </div>

        <div class="policy-toolbar">
          <div class="policy-search-field">
            <div class="policy-search-row">
              <div class="nv-search-box">
                <span class="nv-search-icon" aria-hidden="true"></span>
                <input id="policy-search" type="text" autocomplete="off" spellcheck="false" aria-label="Search policies" aria-keyshortcuts="Control+K">
                <kbd class="nv-search-shortcut" aria-hidden="true" style="display: none;"><kbd>Ctrl</kbd><kbd>K</kbd></kbd>
              </div>
              <button id="policy-settings" type="button" aria-label="Search settings" title="Search settings">
                <svg class="bindiff-settings-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                  <path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065">
                  </path>
                  <path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"></path>
                </svg>
              </button>
            </div>
          </div>
          <div class="policy-limit-controls">
            <span class="policy-limit-label">Limit</span>
            <input id="policy-limit" type="number" min="25" max="5000" step="25" value="350" aria-label="Rendered row limit">
            <label class="policy-limit-toggle" for="policy-limit-unlimited">
              <input id="policy-limit-unlimited" type="checkbox">
              <span>Unlimited</span>
            </label>
          </div>
          <div class="policy-toolbar-actions">
            <div class="policy-view-dropdown" id="policy-view-dropdown">
              <button id="policy-view-trigger" type="button" aria-haspopup="menu" aria-expanded="false">
                <span>View</span>
                <span class="policy-view-chevron" aria-hidden="true"></span>
              </button>
              <div class="policy-view-menu" id="policy-view-menu" role="menu" hidden>
                <label class="policy-view-option" role="menuitemcheckbox">
                  <input type="checkbox" data-policy-pane="tree" checked>
                  <span>Tree</span>
                </label>
                <label class="policy-view-option" role="menuitemcheckbox">
                  <input type="checkbox" data-policy-pane="table" checked>
                  <span>Table</span>
                </label>
                <label class="policy-view-option" role="menuitemcheckbox">
                  <input type="checkbox" data-policy-pane="detail">
                  <span>Details</span>
                </label>
              </div>
            </div>
            <div class="policy-column-dropdown" id="policy-column-dropdown">
              <button id="policy-column-trigger" type="button" aria-haspopup="menu" aria-expanded="false">
                <span>Table</span>
                <span class="policy-view-chevron" aria-hidden="true"></span>
              </button>
            </div>
          </div>
        </div>

        <div class="policy-layout">
          <aside class="policy-tree-panel" aria-label="Policy categories">
            <div class="policy-pane-header">
              <span>Categories</span>
            </div>
            <div class="policy-tree" id="policy-tree" role="tree">
              <div class="policy-tree-placeholder"></div>
            </div>
          </aside>
          <div class="policy-splitter" data-policy-splitter="tree" aria-hidden="true"></div>

          <section class="policy-table-panel" aria-label="Policy list">
            <div class="policy-table-wrap">
              <table class="policy-table">
                <colgroup id="policy-table-cols"></colgroup>
                <thead>
                  <tr id="policy-table-head">
                    <th scope="col" data-column="setting" class="policy-table-header"><span class="policy-table-header-content"><span class="policy-table-header-label">Name</span></span></th>
                    <th scope="col" data-column="scope" class="policy-table-header"><span class="policy-table-header-content"><span class="policy-table-header-label">Scope</span></span></th>
                    <th scope="col" data-column="supported" class="policy-table-header"><span class="policy-table-header-content"><span class="policy-table-header-label">Supported On</span></span></th>
                    <th scope="col" data-column="value" class="policy-table-header"><span class="policy-table-header-content"><span class="policy-table-header-label">Value</span></span></th>
                  </tr>
                </thead>
                <tbody id="policy-table-body"></tbody>
              </table>
            </div>
            <div class="policy-table-note" id="policy-table-note"></div>
            <div class="policy-column-menu" id="policy-column-menu" hidden></div>
          </section>
          <div class="policy-splitter" data-policy-splitter="detail" aria-hidden="true" hidden></div>

          <section class="policy-detail-panel" id="policy-detail" aria-label="Policy detail" hidden>
            <div class="policy-pane-header">
              <span>Details</span>
              <span id="policy-detail-scope">none</span>
            </div>
            <div class="policy-detail-body" id="policy-detail-body"></div>
          </section>
        </div>

        <div class="bindiff-settings-modal" id="policy-settings-modal" hidden>
          <div class="bindiff-settings-dialog" id="policy-settings-dialog" role="dialog" aria-modal="true" aria-labelledby="policy-settings-title">
            <div class="bindiff-settings-header" id="policy-settings-header">
              <h2 id="policy-settings-title">Search Settings</h2>
              <button id="policy-settings-close" type="button" aria-label="Close search settings" title="Close search settings">
                <svg class="bindiff-close-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                  <path d="M18 6l-12 12"></path>
                  <path d="M6 6l12 12"></path>
                </svg>
              </button>
            </div>
            <div class="bindiff-settings-body">
              <label class="bindiff-setting-row bindiff-setting-number-row" for="policy-search-delay">
                <span>Search delay</span>
                <input id="policy-search-delay" type="number" min="0" max="2000" step="50" value="200">
                <span>ms</span>
              </label>
              <label class="bindiff-setting-row" for="policy-search-wildcards">
                <input id="policy-search-wildcards" type="checkbox">
                <span>Use wildcards (* and ?)</span>
              </label>
              <label class="bindiff-setting-row" for="policy-search-whole">
                <input id="policy-search-whole" type="checkbox">
                <span>Match whole string</span>
              </label>
              <label class="bindiff-setting-row" for="policy-search-case">
                <input id="policy-search-case" type="checkbox">
                <span>Case sensitive</span>
              </label>
              <label class="bindiff-setting-row" for="policy-search-any">
                <input id="policy-search-any" type="checkbox">
                <span>Match any term</span>
              </label>
              <label class="bindiff-setting-row" for="policy-search-current-path">
                <input id="policy-search-current-path" type="checkbox">
                <span>Search only current selected path</span>
              </label>
              <label class="bindiff-setting-row" for="policy-search-names">
                <input id="policy-search-names" type="checkbox" checked>
                <span>Search names and categories</span>
              </label>
              <label class="bindiff-setting-row" for="policy-search-registry">
                <input id="policy-search-registry" type="checkbox" checked>
                <span>Search registry paths and values</span>
              </label>
              <label class="bindiff-setting-row" for="policy-search-details">
                <input id="policy-search-details" type="checkbox" checked>
                <span>Search explanations and support text</span>
              </label>
            </div>
            <div class="bindiff-settings-footer">
              <button id="policy-settings-reset" type="button">Reset</button>
              <button id="policy-settings-done" type="button">Close</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <footer>
    <div class="footer-row">
      <div class="footer-left">
        <div class="footer-copy">&copy; 2026 Nohuto</div>
      </div>
      <div class="footer-tools">
        <div class="footer-tools-row">
          <select id="theme-select" name="theme" aria-label="Theme">
              <option value="system">System</option>
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="ayu-dark">Ayu Dark</option>
              <option value="ayu-light">Ayu Light</option>
              <option value="catppuccin-frappe">Catppuccin Frappe</option>
              <option value="catppuccin-latte">Catppuccin Latte</option>
              <option value="catppuccin-macchiato">Catppuccin Macchiato</option>
              <option value="catppuccin-mocha">Catppuccin Mocha</option>
              <option value="everforest-dark">Everforest Dark</option>
              <option value="everforest-light">Everforest Light</option>
              <option value="gray-black">Gray Black</option>
              <option value="gruvbox-dark">Gruvbox Dark</option>
              <option value="gruvbox-light">Gruvbox Light</option>
              <option value="horizon">Horizon</option>
              <option value="kanagawa-dragon">Kanagawa Dragon</option>
              <option value="kanagawa-lotus">Kanagawa Lotus</option>
              <option value="kanagawa-wave">Kanagawa Wave</option>
              <option value="monokai">Monokai</option>
              <option value="night-owl">Night Owl</option>
              <option value="nord">Nord</option>
              <option value="one-dark">One Dark</option>
              <option value="one-light">One Light</option>
              <option value="purple-black">Purple Black</option>
              <option value="rose-pine">Rose Pine</option>
              <option value="rose-pine-moon">Rose Pine Moon</option>
              <option value="solarized-dark">Solarized Dark</option>
              <option value="solarized-light">Solarized Light</option>
          </select>
        </div>
      </div>
      <div class="social">
        <a href="https://github.com/nohuto" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">
          <span class="social-icon social-icon-github" aria-hidden="true"></span>
        </a>
        <!-- <a href="https://www.youtube.com/@5Noverse" target="_blank" rel="noopener noreferrer">
          <img decoding="async" src="main/icons/dark/youtube-icon.png" width="96" height="96" data-dark-src="main/icons/dark/youtube-icon.png" data-light-src="main/icons/light/youtube-icon.png" loading="lazy" alt="">
        </a> -->
        <button class="icon-button" type="button" data-email="copy" data-toast="Email copied" aria-label="Copy email to clipboard">
          <span class="social-icon social-icon-email" aria-hidden="true"></span>
        </button>
        <a href="https://discord.noverse.dev" target="_blank" rel="noopener noreferrer" aria-label="Discord server">
          <span class="social-icon social-icon-discord" aria-hidden="true"></span>
        </a>
      </div>
    </div>
  </footer>
</body>

</html>
